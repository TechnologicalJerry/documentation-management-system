name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/devdocs

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Install dependencies
        working-directory: express-server
        run: npm ci

      - name: Run ESLint on all services
        working-directory: express-server
        run: npm run lint

      - name: Check Prettier formatting
        working-directory: express-server
        run: npm run prettier --workspaces --if-present --check "src/**/*.{ts,json}" 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Job 2: Type-check
  # ---------------------------------------------------------------------------
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Install dependencies
        working-directory: express-server
        run: npm ci

      - name: Run TypeScript compiler checks
        working-directory: express-server
        run: npm run tsc --workspaces --if-present --noEmit 2>/dev/null || npm run build --workspaces --if-present

  # ---------------------------------------------------------------------------
  # Job 3: Test (parallel matrix per service)
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - project-service
          - document-service
          - template-service
          - ai-service
          - file-service
          - notification-service
          - audit-service
          - analytics-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devdocs
          POSTGRES_PASSWORD: devdocs_test
          POSTGRES_DB: devdocs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: devdocs
          MONGO_INITDB_ROOT_PASSWORD: devdocs_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      # Postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: devdocs
      POSTGRES_PASSWORD: devdocs_test
      POSTGRES_DB: devdocs_test
      # MongoDB
      MONGODB_URI: mongodb://devdocs:devdocs_test@localhost:27017/devdocs_test?authSource=admin
      # Redis
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # JWT
      JWT_ACCESS_SECRET: test-access-secret-32-chars-minimum
      JWT_REFRESH_SECRET: test-refresh-secret-32-chars-minimum
      # Service placeholders
      AUTH_SERVICE_URL: http://localhost:3001
      USER_SERVICE_URL: http://localhost:3002

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            express-server/node_modules
            express-server/services/${{ matrix.service }}/node_modules
            express-server/packages/*/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('express-server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: express-server
        run: npm ci

      - name: Run Prisma migrations (if applicable)
        working-directory: express-server/services/${{ matrix.service }}
        run: |
          if [ -f "prisma/schema.prisma" ]; then
            npx prisma migrate deploy 2>/dev/null || npx prisma db push --force-reset
          fi
        env:
          DATABASE_URL: postgresql://devdocs:devdocs_test@localhost:5432/devdocs_test

      - name: Run unit tests
        working-directory: express-server/services/${{ matrix.service }}
        run: npm test --passWithNoTests --coverage --coverageDirectory=coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: express-server/services/${{ matrix.service }}/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 4: Build TypeScript
  # ---------------------------------------------------------------------------
  build:
    name: Build TypeScript
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: express-server/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('express-server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: express-server
        run: npm ci

      - name: Build shared packages first
        working-directory: express-server
        run: |
          npm run build -w @devdocs/shared-types 2>/dev/null || true
          npm run build -w @devdocs/shared-utils 2>/dev/null || true

      - name: Build all services
        working-directory: express-server
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: |
            express-server/services/*/dist/
            express-server/packages/*/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 5: Docker Build (validate all images build successfully)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - project-service
          - document-service
          - template-service
          - ai-service
          - file-service
          - notification-service
          - audit-service
          - analytics-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: express-server/services/${{ matrix.service }}
          file: express-server/services/${{ matrix.service }}/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

  # ---------------------------------------------------------------------------
  # Job 6: Security Scan (Trivy)
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'express-server'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run npm audit
        working-directory: express-server
        run: npm audit --audit-level=high 2>/dev/null || true

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'express-server'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

  # ---------------------------------------------------------------------------
  # Final status gate
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, build, docker-build, security-scan]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint failed" && exit 1
          fi
          if [[ "${{ needs.type-check.result }}" != "success" ]]; then
            echo "Type check failed" && exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Tests failed" && exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build failed" && exit 1
          fi
          echo "All CI checks passed."
