name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # Never cancel a running deployment

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/devdocs

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build and push all Docker images to registry
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - project-service
          - document-service
          - template-service
          - ai-service
          - file-service
          - notification-service
          - audit-service
          - analytics-service

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main-${{ github.run_number }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache-${{ matrix.service }}
          key: ${{ runner.os }}-buildx-${{ matrix.service }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.service }}-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: express-server/services/${{ matrix.service }}
          file: express-server/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.service }}
          cache-to: type=local,dest=/tmp/.buildx-cache-${{ matrix.service }}-new,mode=max
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            BUILD_NUMBER=${{ github.run_number }}

      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.service }}
          mv /tmp/.buildx-cache-${{ matrix.service }}-new /tmp/.buildx-cache-${{ matrix.service }}

      - name: Output image digest
        run: echo "Image ${{ matrix.service }} pushed with digest ${{ steps.build.outputs.digest }}"

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to Staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.devdocsstudio.com

    env:
      IMAGE_TAG: main-${{ github.run_number }}
      DEPLOY_ENV: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.STAGING_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.STAGING_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (staging)
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name devdocs-staging \
            --kubeconfig /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Update image tags in Kubernetes manifests
        run: |
          SERVICES=(user-service project-service document-service template-service ai-service file-service notification-service audit-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            kubectl set image deployment/${SERVICE} \
              ${SERVICE}=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${SERVICE}:${{ env.IMAGE_TAG }} \
              -n devdocs-staging --record 2>/dev/null || true
          done

      - name: Wait for rollout to complete (staging)
        run: |
          SERVICES=(user-service project-service document-service template-service ai-service file-service notification-service audit-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            echo "Waiting for $SERVICE..."
            kubectl rollout status deployment/${SERVICE} \
              -n devdocs-staging \
              --timeout=300s || {
              echo "Rollout failed for $SERVICE, triggering rollback..."
              kubectl rollout undo deployment/${SERVICE} -n devdocs-staging
              exit 1
            }
          done

      - name: Run smoke tests (staging)
        run: |
          GATEWAY_URL="https://staging.devdocsstudio.com"
          echo "Running smoke tests against $GATEWAY_URL"
          # Health check each service via API gateway
          for i in {1..10}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$GATEWAY_URL/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Gateway health check passed (HTTP $HTTP_STATUS)"
              break
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS, retrying in 15s..."
            sleep 15
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Smoke tests failed — gateway not healthy after 10 attempts"
            exit 1
          fi

      - name: Notify staging deployment success
        if: success()
        run: |
          echo "Staging deployment succeeded for build ${{ github.run_number }}"
          # Optionally post to Slack, PagerDuty, etc.

      - name: Rollback staging on failure
        if: failure()
        run: |
          echo "Staging deployment failed — rolling back all deployments"
          SERVICES=(user-service project-service document-service template-service ai-service file-service notification-service audit-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            kubectl rollout undo deployment/${SERVICE} -n devdocs-staging || true
          done

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Production (requires manual approval)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      url: https://app.devdocsstudio.com

    env:
      IMAGE_TAG: main-${{ github.run_number }}
      DEPLOY_ENV: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (production)
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name devdocs-production \
            --kubeconfig /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Snapshot current image tags (rollback reference)
        id: snapshot
        run: |
          SERVICES=(user-service project-service document-service template-service ai-service file-service notification-service audit-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            CURRENT=$(kubectl get deployment/${SERVICE} -n devdocs-production \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "unknown")
            echo "${SERVICE}=${CURRENT}" >> /tmp/rollback-snapshot.txt
          done
          echo "Snapshot saved:"
          cat /tmp/rollback-snapshot.txt

      - name: Rolling update — production (canary-style, one by one)
        run: |
          SERVICES=(user-service project-service document-service template-service ai-service file-service notification-service audit-service analytics-service)
          for SERVICE in "${SERVICES[@]}"; do
            echo "Updating $SERVICE..."
            kubectl set image deployment/${SERVICE} \
              ${SERVICE}=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${SERVICE}:${{ env.IMAGE_TAG }} \
              -n devdocs-production --record 2>/dev/null || true

            echo "Waiting for $SERVICE rollout..."
            kubectl rollout status deployment/${SERVICE} \
              -n devdocs-production --timeout=300s || {
              echo "FAILURE: $SERVICE rollout failed — initiating full rollback"
              # Roll back everything that was already updated
              for DONE_SERVICE in "${SERVICES[@]}"; do
                kubectl rollout undo deployment/${DONE_SERVICE} -n devdocs-production || true
                [[ "$DONE_SERVICE" == "$SERVICE" ]] && break
              done
              exit 1
            }
            echo "$SERVICE updated successfully."
          done

      - name: Run production smoke tests
        run: |
          GATEWAY_URL="https://app.devdocsstudio.com"
          echo "Running production smoke tests against $GATEWAY_URL"
          for i in {1..15}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$GATEWAY_URL/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Production health check passed (HTTP $HTTP_STATUS)"
              break
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS, retrying in 20s..."
            sleep 20
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Production smoke tests FAILED"
            exit 1
          fi

      - name: Tag release in Git
        if: success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "release-${{ github.run_number }}" \
            -m "Production release ${{ github.run_number }} — ${{ github.sha }}"
          git push origin "release-${{ github.run_number }}" || true

      - name: Notify production deployment success
        if: success()
        run: |
          echo "Production deployment ${{ github.run_number }} succeeded"

      - name: Rollback production on failure
        if: failure()
        run: |
          echo "Production deployment FAILED — rolling back to previous versions"
          if [ -f /tmp/rollback-snapshot.txt ]; then
            while IFS='=' read -r SERVICE IMAGE; do
              if [ "$IMAGE" != "unknown" ]; then
                echo "Restoring $SERVICE to $IMAGE"
                kubectl set image deployment/${SERVICE} \
                  ${SERVICE}=${IMAGE} -n devdocs-production || true
                kubectl rollout status deployment/${SERVICE} \
                  -n devdocs-production --timeout=120s || true
              fi
            done < /tmp/rollback-snapshot.txt
          else
            SERVICES=(user-service project-service document-service template-service ai-service file-service notification-service audit-service analytics-service)
            for SERVICE in "${SERVICES[@]}"; do
              kubectl rollout undo deployment/${SERVICE} -n devdocs-production || true
            done
          fi
          echo "Rollback complete"
