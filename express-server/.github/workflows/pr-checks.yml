name: PR Quality Checks

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  COVERAGE_THRESHOLD: 70

jobs:
  # ---------------------------------------------------------------------------
  # Guard: skip draft PRs
  # ---------------------------------------------------------------------------
  pr-guard:
    name: PR Guard
    runs-on: ubuntu-latest
    steps:
      - name: Skip draft PRs
        if: github.event.pull_request.draft == true
        run: |
          echo "PR is a draft — skipping checks."
          exit 0

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: pr-guard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Install dependencies
        working-directory: express-server
        run: npm ci

      - name: Run ESLint
        working-directory: express-server
        run: npm run lint

      - name: Check Prettier formatting
        working-directory: express-server
        run: |
          npx prettier --check "services/**/*.ts" "packages/**/*.ts" 2>/dev/null || {
            echo ""
            echo "Prettier formatting issues found. Run 'make lint-fix' or 'npm run lint --workspaces --if-present -- --fix' to fix."
            exit 1
          }

      - name: Detect TODO/FIXME in changed files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | \
            xargs grep -rn "TODO\|FIXME\|HACK\|XXX" 2>/dev/null | \
            head -20 || true
          echo "Note: TODOs/FIXMEs above are informational only."

  # ---------------------------------------------------------------------------
  # TypeScript type-check
  # ---------------------------------------------------------------------------
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    needs: pr-guard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Install dependencies
        working-directory: express-server
        run: npm ci

      - name: Build shared packages
        working-directory: express-server
        run: |
          npm run build -w @devdocs/shared-types 2>/dev/null || true
          npm run build -w @devdocs/shared-utils 2>/dev/null || true

      - name: TypeScript strict type check
        working-directory: express-server
        run: |
          FAILED=0
          for SERVICE_DIR in services/*/; do
            SERVICE=$(basename "$SERVICE_DIR")
            echo "Type-checking $SERVICE..."
            (cd "$SERVICE_DIR" && npx tsc --noEmit) || {
              echo "Type check FAILED for $SERVICE"
              FAILED=1
            }
          done
          exit $FAILED

  # ---------------------------------------------------------------------------
  # Test coverage
  # ---------------------------------------------------------------------------
  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: devdocs
          POSTGRES_PASSWORD: devdocs_test
          POSTGRES_DB: devdocs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: devdocs
          MONGO_INITDB_ROOT_PASSWORD: devdocs_test
        ports:
          - 27017:27017

    env:
      NODE_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: devdocs
      POSTGRES_PASSWORD: devdocs_test
      POSTGRES_DB: devdocs_test
      MONGODB_URI: mongodb://devdocs:devdocs_test@localhost:27017/devdocs_test?authSource=admin
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: test-access-secret-32-chars-minimum
      JWT_REFRESH_SECRET: test-refresh-secret-32-chars-minimum

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Install dependencies
        working-directory: express-server
        run: npm ci

      - name: Run all tests with coverage
        working-directory: express-server
        run: |
          npm run test --workspaces --if-present -- \
            --passWithNoTests \
            --coverage \
            --coverageThreshold='{"global":{"lines":${{ env.COVERAGE_THRESHOLD }},"branches":${{ env.COVERAGE_THRESHOLD }},"functions":${{ env.COVERAGE_THRESHOLD }},"statements":${{ env.COVERAGE_THRESHOLD }}}}' \
            --forceExit 2>/dev/null || \
          npm run test --workspaces --if-present -- --passWithNoTests --coverage --forceExit

      - name: Merge coverage reports
        run: |
          mkdir -p /tmp/coverage-merged
          find express-server -path "*/coverage/coverage-final.json" | head -20 > /tmp/coverage-files.txt
          cat /tmp/coverage-files.txt

      - name: Upload merged coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: express-server
          flags: pr-${{ github.event.pull_request.number }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Coverage comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: always()
        with:
          header: test-coverage
          message: |
            ## Test Coverage Report

            Coverage threshold: **${{ env.COVERAGE_THRESHOLD }}%**

            Coverage artifacts are available in the workflow run.
            To view details, check the "test-coverage" job artifacts.

  # ---------------------------------------------------------------------------
  # Bundle / build size check
  # ---------------------------------------------------------------------------
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Install dependencies
        working-directory: express-server
        run: npm ci

      - name: Build all services
        working-directory: express-server
        run: npm run build

      - name: Check for unexpectedly large dist directories
        run: |
          echo "Build artifact sizes:"
          find express-server/services -name "dist" -type d \
            -exec du -sh {} \; 2>/dev/null | sort -h

  # ---------------------------------------------------------------------------
  # Dependency audit
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: express-server/package-lock.json

      - name: Run npm audit (high severity)
        working-directory: express-server
        run: |
          npm audit --audit-level=high 2>&1 | tee /tmp/audit-results.txt || true
          # Fail only on critical vulnerabilities
          npm audit --audit-level=critical 2>&1 && echo "No critical vulnerabilities found."

      - name: Check for known bad packages
        working-directory: express-server
        run: |
          # Check for deprecated or vulnerable packages
          echo "Checking package list..."
          npm list --depth=0 2>/dev/null | head -50 || true

  # ---------------------------------------------------------------------------
  # PR summary
  # ---------------------------------------------------------------------------
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-coverage, build-check]
    if: always()

    steps:
      - name: Post PR status summary
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-summary
          message: |
            ## PR Quality Check Results

            | Check | Status |
            |-------|--------|
            | Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | TypeScript | ${{ needs.type-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |
            | Test Coverage | ${{ needs.test-coverage.result == 'success' && '✅ Passed' || (needs.test-coverage.result == 'skipped' && '⏭ Skipped' || '❌ Failed') }} |
            | Build | ${{ needs.build-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |

            **Branch:** `${{ github.head_ref }}` → `${{ github.base_ref }}`
            **Commit:** `${{ github.event.pull_request.head.sha }}`
