version: '3.9'

# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  # ─── Infrastructure (dev tweaks) ───────────────────────────────────────────

  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: devdocs

  mongodb:
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  mysql:
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: devdocs

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    command: redis-server --requirepass password

  # ─── api-gateway ───────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile.dev
    environment:
      - NODE_ENV=development
      - JWT_SECRET=dev_jwt_secret_not_for_production
    volumes:
      - ./services/api-gateway/src:/app/services/api-gateway/src
      - ./packages:/app/packages
    command: npx ts-node-dev --respawn --transpile-only services/api-gateway/src/index.ts

  # ─── auth-service ──────────────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile.dev
    environment:
      - NODE_ENV=development
      - JWT_SECRET=dev_jwt_secret_not_for_production
    volumes:
      - ./services/auth-service/src:/app/services/auth-service/src
      - ./packages:/app/packages
    command: npx ts-node-dev --respawn --transpile-only services/auth-service/src/index.ts

