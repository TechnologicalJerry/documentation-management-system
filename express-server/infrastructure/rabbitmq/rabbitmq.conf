## =============================================================================
## DevDocs Studio — RabbitMQ configuration
## Reference: https://www.rabbitmq.com/configure.html
## =============================================================================

# ─── Networking ───────────────────────────────────────────────────────────────
listeners.tcp.default = 5672
management.tcp.port   = 15672

# ─── Default credentials (overridden by RABBITMQ_DEFAULT_USER/PASS env vars) ──
# Do NOT store plaintext passwords here in production; use env vars or secrets.

# ─── Load definitions on startup ──────────────────────────────────────────────
# This tells RabbitMQ to import the topology (exchanges, queues, bindings)
# from definitions.json when the broker first starts.
management.load_definitions = /etc/rabbitmq/definitions.json

# ─── Logging ──────────────────────────────────────────────────────────────────
log.console      = true
log.console.level = info
log.file         = false

# ─── Memory & disk thresholds ─────────────────────────────────────────────────
# Trigger flow-control when free memory drops below 256 MB
vm_memory_high_watermark.absolute = 256MiB
# Block producers when free disk space drops below 1 GB
disk_free_limit.absolute = 1GB

# ─── Heartbeat ────────────────────────────────────────────────────────────────
# Consumers use 60 s; set server side to the same value
heartbeat = 60

# ─── Message TTL & queue limits (applied via policy in definitions.json) ──────
# Per-message TTL for dead-letter queue: 7 days
# (Set as a policy rather than here to remain per-queue configurable)

# ─── Plugins ──────────────────────────────────────────────────────────────────
# rabbitmq_management is enabled by the management-alpine image tag.
# Enable additional plugins if needed:
# enabled_plugins = [rabbitmq_management, rabbitmq_prometheus].
