networks:
  devdocs-network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
  mysql_data:
  rabbitmq_data:
  redis_data:
  uploads_data:

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: devdocs-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-devdocs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7-jammy
    container_name: devdocs-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/init.js:/docker-entrypoint-initdb.d/init.js
    ports:
      - "27017:27017"
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: devdocs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-password}
      MYSQL_DATABASE: devdocs
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: devdocs-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
      - ./infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: devdocs-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: devdocs-ollama
    volumes:
      - ./infrastructure/ollama/models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - devdocs-network
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: all
    restart: unless-stopped

  # ─── Microservices ─────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: devdocs-api-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3001
      - USER_SERVICE_URL=http://user-service:3002
      - PROJECT_SERVICE_URL=http://project-service:3003
      - DOCUMENT_SERVICE_URL=http://document-service:3004
      - TEMPLATE_SERVICE_URL=http://template-service:3005
      - AI_SERVICE_URL=http://ai-service:3006
      - EXPORT_SERVICE_URL=http://export-service:3007
      - FILE_SERVICE_URL=http://file-service:3008
      - NOTIFICATION_SERVICE_URL=http://notification-service:3009
      - AUDIT_SERVICE_URL=http://audit-service:3010
      - ANALYTICS_SERVICE_URL=http://analytics-service:3011
      - REDIS_URL=redis://:${REDIS_PASSWORD:-password}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
    depends_on:
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: devdocs-auth-service
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/devdocs_auth
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - REDIS_URL=redis://:${REDIS_PASSWORD:-password}@redis:6379
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: devdocs-user-service
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/devdocs_users
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  project-service:
    build:
      context: .
      dockerfile: services/project-service/Dockerfile
    container_name: devdocs-project-service
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/devdocs_projects
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  document-service:
    build:
      context: .
      dockerfile: services/document-service/Dockerfile
    container_name: devdocs-document-service
    environment:
      - NODE_ENV=production
      - PORT=3004
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/devdocs_documents?authSource=admin
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  template-service:
    build:
      context: .
      dockerfile: services/template-service/Dockerfile
    container_name: devdocs-template-service
    environment:
      - NODE_ENV=production
      - PORT=3005
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/devdocs_templates?authSource=admin
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3005/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: devdocs-ai-service
    environment:
      - NODE_ENV=production
      - PORT=3006
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/devdocs_ai?authSource=admin
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3006/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  export-service:
    build:
      context: .
      dockerfile: services/export-service/Dockerfile
    container_name: devdocs-export-service
    environment:
      - NODE_ENV=production
      - PORT=3007
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/devdocs_export?authSource=admin
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - EXPORT_OUTPUT_PATH=/var/exports
    volumes:
      - uploads_data:/var/exports
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3007/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
    container_name: devdocs-file-service
    environment:
      - NODE_ENV=production
      - PORT=3008
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/devdocs_files?authSource=admin
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      - STORAGE_PROVIDER=local
      - LOCAL_STORAGE_PATH=/var/uploads
    volumes:
      - uploads_data:/var/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3008/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: devdocs-notification-service
    environment:
      - NODE_ENV=production
      - PORT=3009
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=devdocs_notifications
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3009/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    container_name: devdocs-audit-service
    environment:
      - NODE_ENV=production
      - PORT=3010
      - MONGODB_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/devdocs_audit?authSource=admin
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3010/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    container_name: devdocs-analytics-service
    environment:
      - NODE_ENV=production
      - PORT=3011
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=devdocs_analytics
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - devdocs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3011/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
